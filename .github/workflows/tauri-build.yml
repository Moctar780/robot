# 🚗 Babylon Car Simulator - Multi-platform Tauri Build
#
# Builds Tauri application for:
#   - Linux (.deb / .AppImage)
#   - Windows (.msi / .exe)
#   - macOS (.dmg)
#   - Android (.apk / .aab)
#
# Secrets needed in GitHub repository:
#   - ANDROID_KEYSTORE_PASSWORD   (optional, for release signing)
#   - ANDROID_KEY_ALIAS           (optional)
#   - ANDROID_KEY_PASSWORD        (optional)
#   - APPLE_ID                    (optional, for notarization)
#   - APPLE_PASSWORD              (optional)
#   - APPLE_TEAM_ID               (optional)

name: 🏗️ Build & Release Multi-platform

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent build per branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  #  Desktop builds (Linux, Windows, macOS)
  # ──────────────────────────────────────────────
  desktop:
    name: "🖥️ ${{ matrix.platform.name }}"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bins: deb,appimage,rpm
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bins: msi,nsis
          - name: macOS (Intel)
            os: macos-13
            target: x86_64-apple-darwin
            bins: dmg
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            bins: dmg

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: 🐧 Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: 🍎 Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          # Install required libraries if any

      - name: 🔨 Build Tauri application
        uses: tauri-apps/tauri-action@v0
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: >-
            --target ${{ matrix.platform.target }}
            --bundles ${{ matrix.platform.bins }}

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: babylon-car-${{ runner.os }}-${{ runner.arch }}
          path: |
            src-tauri/target/release/bundle/**/*
            !src-tauri/target/release/bundle/**/*.sig
          if-no-files-found: warn
          compression-level: 0

  # ──────────────────────────────────────────────
  #  Android build (APK + AAB)
  # ──────────────────────────────────────────────
  android:
    name: "📱 Android APK / AAB"
    runs-on: ubuntu-24.04

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets:
            aarch64-linux-android
            armv7-linux-androideabi
            x86_64-linux-android
            i686-linux-android

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android NDK
        run: |
          SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          $SDKMANAGER --install "ndk;27.0.12077973" || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: 🐧 Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: 🏗️ Initialize Android project (Tauri)
        run: npx tauri android init

      - name: 🔑 Generate debug keystore (if not set)
        if: secrets.ANDROID_KEYSTORE_PASSWORD == ''
        run: |
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/src-tauri/gen/android/app/keystore.jks \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Developer, OU=Dev, O=Organization, L=City, S=State, C=US"

      - name: 🔨 Build Android APK + AAB
        uses: tauri-apps/tauri-action@v0
        id: build-android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'android' }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'androiddebugkey' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'android' }}
        with:
          args: >-
            --target aarch64-linux-android

      - name: 📤 Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: babylon-car-android
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: warn
          compression-level: 0

  # ──────────────────────────────────────────────
  #  Create GitHub Release (on tags only)
  # ──────────────────────────────────────────────
  release:
    name: "📦 Create Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [desktop, android]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            babylon-car-Linux-*/**/*
            babylon-car-Windows-*/**/*
            babylon-car-macOS-*/**/*
            babylon-car-android/**/*
