<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon.js Car Scene - Havok Physics + Blockly</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; font-family: sans-serif; }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Zone Blockly (gauche) */
        #blocklyPanel {
            width: 40%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #444;
        }

        #blocklyDiv {
            flex: 1;
            min-height: 0;
        }

        #toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            align-items: center;
        }

        #toolbar button {
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        #runBtn {
            background: #4caf50;
            color: white;
        }
        #runBtn:hover { background: #43a047; }

        #stopBtn {
            background: #e53935;
            color: white;
        }
        #stopBtn:hover { background: #c62828; }

        #resetBtn {
            background: #ffa726;
            color: white;
        }
        #resetBtn:hover { background: #fb8c00; }

        #toolbar span {
            color: #aaa;
            font-size: 12px;
            margin-left: auto;
        }

        /* Zone Babylon.js (droite) */
        #renderCanvas {
            flex: 1;
            height: 100%;
            display: block;
        }

        /* Menu flottant en haut à droite du canvas */
        #sceneMenu {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .menu-group {
            background: rgba(20, 20, 20, 0.92);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .menu-group label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 2px 6px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 2px;
        }

        .menu-group button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.85);
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            text-align: left;
            transition: all 0.15s;
        }
        .menu-group button:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .menu-group button.active {
            background: rgba(76, 175, 80, 0.35);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Zone Blockly -->
        <div id="blocklyPanel">
            <div id="toolbar">
                <button id="runBtn" onclick="runBlockly()">▶ Exécuter</button>
                <button id="stopBtn" onclick="stopBlockly()">■ Arrêter</button>
                <button id="resetBtn" onclick="resetBlockly()">⟲ Réinitialiser</button>
                <span>Contrôle par blocs</span>
            </div>
            <div id="blocklyDiv"></div>
        </div>

        <!-- Zone Babylon.js -->
        <div style="position:relative; flex:1; height:100%;">
            <canvas id="renderCanvas"></canvas>

            <!-- Menu flottant -->
            <div id="sceneMenu">
                <div class="menu-group" id="envMenu">
                    <label>Environnement</label>
                    <button data-index="0" class="active" onclick="switchEnv(0)">🏞️ Plaine</button>
                    <button data-index="1" onclick="switchEnv(1)">🧊 Glace</button>
                    <button data-index="2" onclick="switchEnv(2)">🌕 Lunaire</button>
                    <button data-index="3" onclick="switchEnv(3)">🧱 Obstacles</button>
                </div>
                <div class="menu-group" id="vehicleMenu">
                    <label>Véhicule</label>
                    <button data-vehicle="car" class="active" onclick="switchVehicle('car')">🚗 Voiture</button>
                    <button data-vehicle="rover" onclick="switchVehicle('rover')">🛸 Rover</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toolbox des blocs Blockly -->
    <xml id="toolbox" style="display: none">
        <category name="Robot" colour="230">
            <block type="robot_move"></block>
            <block type="robot_move_distance"></block>
            <block type="robot_go_straight"></block>
            <block type="robot_turn_left"></block>
            <block type="robot_turn_right"></block>
            <block type="robot_steer"></block>
            <block type="robot_turn_angle"></block>
            <block type="robot_stop"></block>
            <block type="robot_wait"></block>
        </category>
        <category name="Logique" colour="210">
            <block type="controls_repeat_ext">
                <value name="TIMES">
                    <block type="math_number">
                        <field name="NUM">5</field>
                    </block>
                </value>
            </block>
            <block type="controls_whileUntil"></block>
            <block type="controls_if"></block>
        </category>
        <category name="Valeurs" colour="160">
            <block type="math_number"></block>
        </category>
    </xml>

    <script src="/blockly/blockly_compressed.js"></script>
    <script src="/blockly/blocks_compressed.js"></script>
    <script src="/blockly/javascript_compressed.js"></script>
    <script src="/blockly/msg/fr.js"></script>

    <script type="module" src="/main.js"></script>
</body>
</html>
