<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon.js Car Scene - Havok Physics + Blockly</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; font-family: sans-serif; }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Zone Blockly (gauche) */
        #blocklyPanel {
            width: 40%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #444;
        }

        #blocklyDiv {
            flex: 1;
            min-height: 0;
        }

        #toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            align-items: center;
        }

        #toolbar button {
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        #runBtn {
            background: #4caf50;
            color: white;
        }
        #runBtn:hover { background: #43a047; }

        #stopBtn {
            background: #e53935;
            color: white;
        }
        #stopBtn:hover { background: #c62828; }

        #resetBtn {
            background: #ffa726;
            color: white;
        }
        #resetBtn:hover { background: #fb8c00; }

        #toolbar span {
            color: #aaa;
            font-size: 12px;
            margin-left: auto;
        }

        /* Zone Babylon.js (droite) */
        #renderCanvas {
            flex: 1;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Zone Blockly -->
        <div id="blocklyPanel">
            <div id="toolbar">
                <button id="runBtn" onclick="runBlockly()">▶ Exécuter</button>
                <button id="stopBtn" onclick="stopBlockly()">■ Arrêter</button>
                <button id="resetBtn" onclick="resetBlockly()">⟲ Réinitialiser</button>
                <span>Contrôle par blocs</span>
            </div>
            <div id="blocklyDiv"></div>
        </div>

        <!-- Zone Babylon.js -->
        <canvas id="renderCanvas"></canvas>
    </div>

    <!-- Toolbox des blocs Blockly -->
    <xml id="toolbox" style="display: none">
        <category name="Robot" colour="230">
            <block type="robot_move"></block>
            <block type="robot_move_distance"></block>
            <block type="robot_go_straight"></block>
            <block type="robot_turn_left"></block>
            <block type="robot_turn_right"></block>
            <block type="robot_steer"></block>
            <block type="robot_turn_angle"></block>
            <block type="robot_stop"></block>
            <block type="robot_wait"></block>
        </category>
        <category name="Logique" colour="210">
            <block type="controls_repeat_ext">
                <value name="TIMES">
                    <block type="math_number">
                        <field name="NUM">5</field>
                    </block>
                </value>
            </block>
            <block type="controls_whileUntil"></block>
            <block type="controls_if"></block>
        </category>
        <category name="Valeurs" colour="160">
            <block type="math_number"></block>
        </category>
    </xml>

    <script src="/blockly/blockly_compressed.js"></script>
    <script src="/blockly/blocks_compressed.js"></script>
    <script src="/blockly/javascript_compressed.js"></script>
    <script src="/blockly/msg/fr.js"></script>

    <script type="module" src="/main.js"></script>
</body>
</html>
